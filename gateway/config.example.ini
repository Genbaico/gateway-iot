[gateway]
id = gw01
site = estufa-facamp

[serial]
port = /dev/ttyACM0
baudrate = 9600
read_timeout_s = 3.0

[mqtt]
host = 127.0.0.1
port = 1883
client_id = gateway-iot-gw01
qos = 1
keepalive_s = 30

[buffer]
max_messages = 1000
spool_path = /var/lib/gateway-iot/spool.jsonl

[runtime]
log_level = INFO
